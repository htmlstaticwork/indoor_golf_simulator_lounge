<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Indoor Golf Simulator Lounge</title>
    <meta name="description"
        content="Join our elite community of golfers. Create an account to track stats, book sessions, and more.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%2316A34A%22/><circle cx=%2250%22 cy=%2250%22 r=%2210%22 fill=%22white%22/></svg>">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
        }

        .register-card {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .register-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .form-group {
            display: block;
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .register-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: nowrap;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 20px 16px;
            }

            .form-label {
                flex: 0 0 80px;
                font-size: 0.75rem;
            }

            .register-logo {
                gap: 8px;
            }

            .form-group {
                gap: 8px;
            }
        }

        .register-footer a {
            color: var(--green);
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- PAGE LOADER -->
    <div id="page-loader">
        <div class="loader-golf">
            <div class="loader-ball"></div>
            <div class="loader-text">REGISTERING</div>
            <div class="loader-bar">
                <div class="loader-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="register-card reveal">
        <div class="register-logo">
            <a href="index.html" class="nav-logo" style="font-size: 1.6rem;">
                <div class="logo-icon" style="width: 50px; height: 50px;">G</div>
                GOLF<span>LOUNGE</span>
            </a>

        </div>

        <form id="register-form" action="dashboard.html">
            <div class="form-group">
                <label class="form-label" for="fullname">Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="Full Name" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="Email Address" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <div style="flex: 0 0 70px;">
                        <select class="form-select" style="padding: 13px; width: 100%;">
                            <option>+1</option>
                            <option>+44</option>
                            <option>+61</option>
                            <option>+91</option>
                        </select>
                    </div>
                    <input type="tel" id="phone" class="form-input" placeholder="Phone Number" style="flex: 1; width: 100%;"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="password" class="form-input" placeholder="Password" required style="width: 100%;">
                    <span class="pw-toggle"
                        style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer;"><i class="fa-solid fa-eye"></i></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="Confirm Password" required
                    style="width: 100%;">
            </div>

            <div style="margin-bottom: 32px; font-size: 0.82rem; color: var(--text-muted);">
                <label style="display: flex; gap: 10px; cursor: pointer; flex-wrap: nowrap; align-items: center;">
                    <input type="checkbox"
                        style="width: 18px; height: 18px; accent-color: var(--green); flex-shrink: 0;" required>
                    <span style="white-space: nowrap;">I agree to the <a href="#" style="color: var(--green);">Terms</a>
                        and <a href="#" style="color: var(--green);">Privacy</a>.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" style="width: 100%;">Create Account</button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Login in</a>
        </div>
    </div>

    <button id="back-to-top" class="back-to-top" title="Back to Top">
        <i class="fas fa-chevron-up"></i>
    </button>
    <script src="js/main.js"></script>
</body>

</html>
