<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Indoor Golf Simulator Lounge</title>
    <meta name="description"
        content="Join our elite community of golfers. Create an account to track stats, book sessions, and more.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
        }

        .register-card {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .register-logo {
            text-align: left;
            margin-bottom: 32px;
        }

        .register-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .register-footer a {
            color: var(--green);
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- PAGE LOADER -->
    <div id="page-loader">
        <div class="loader-golf">
            <div class="loader-ball"></div>
            <div class="loader-text">REGISTERING</div>
            <div class="loader-bar">
                <div class="loader-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="register-card reveal">
        <div class="register-logo">
            <a href="index.html" class="nav-logo" style="font-size: 1.6rem;">
                <div class="logo-icon" style="width: 50px; height: 50px;">G</div>
                GOLF<span>LOUNGE</span>
            </a>

        </div>

        <form id="register-form" action="dashboard.html">
            <div class="form-group">
                <label class="form-label" for="fullname">Full Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <div style="display: flex; gap: 8px;">
                    <div style="flex: 0 0 25%;">
                        <select class="form-select" style="padding: 13px;">
                            <option>+1</option>
                            <option>+44</option>
                            <option>+61</option>
                            <option>+91</option>
                        </select>
                    </div>
                    <input type="tel" id="phone" class="form-input" placeholder="000-000-0000" style="flex: 1;"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Create Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    <span class="pw-toggle"
                        style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer;">👁</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="margin-bottom: 32px; font-size: 0.82rem; color: var(--text-muted);">
                <label style="display: flex; gap: 10px; cursor: pointer;">
                    <input type="checkbox"
                        style="width: 18px; height: 18px; accent-color: var(--green); flex-shrink: 0;" required>
                    <span>I agree to the <a href="#" style="color: var(--green);">Terms of Service</a> and <a href="#"
                            style="color: var(--green);">Privacy Policy</a>.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Login Now</a>
        </div>
    </div>

    <button id="back-to-top" class="back-to-top" title="Back to Top">
        <i class="fas fa-chevron-up"></i>
    </button>
    <script src="js/main.js"></script>
</body>

</html>
